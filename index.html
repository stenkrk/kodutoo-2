<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="typer.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Kodutöö</title>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title"> TOP 20</h2>
            <button id="closeSidebar" class="close-btn" aria-label="Sulge sidebar">✕</button>
        </div>
        <div id="results" class="results-list"></div>
    </aside>

    <button id="openSidebar" class="open-sidebar-btn"> Tulemused</button>

    <main class="main-wrap">

        <header class="site-header">
            <h1 class="logo">Kodutöö<span class="logo-dot">.</span></h1>
            <p class="tagline">Kui kiire oled sa?</p>
        </header>

        <section id="name" class="card">
            <button id="googleLoginBtn" class="btn btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right:8px;vertical-align:middle"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Logi sisse Google'iga
            </button>
            <div id="loggedInInfo" style="display:none" class="logged-in-info">
                <span id="loggedInName"></span>
            </div>
            <div id="difficultySelect" class="difficulty-wrap" style="display:none">
                <p class="difficulty-label">Raskusaste</p>
                <div class="difficulty-buttons">
                    <button class="diff-btn active" data-words="5">Kerge</button>
                    <button class="diff-btn" data-words="10">Keskmine</button>
                    <button class="diff-btn" data-words="15">Pro</button>
                </div>
            </div>
            <button id="submitname" class="btn btn-primary" style="display:none">▶ Alusta mängu</button>
        </section>

        <section id="counter" class="card counter-card">
            <div id="time" class="countdown-num"></div>
            <p class="countdown-label">Ole valmis</p>
        </section>

        <section id="info" class="info-bar">
            <div id="wordcount" class="info-item"></div>
            <div class="info-item"> <span id="livetime">0.00</span>s</div>
        </section>

        <section id="wordContainer" class="card word-card">
            <div id="wordProgress" class="word-progress-dots"></div>
            <div id="word" class="word-display"></div>
            <div class="progress-bar-wrap">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
        </section>

        <div id="endButtons" class="end-buttons" style="display:none">
            <button id="restartBtn" class="btn btn-primary"> Mängi uuesti</button>
            <button id="switchUserBtn" class="btn btn-secondary">⇄ Vaheta kasutajat</button>
        </div>

        <section id="scoreCard" class="score-card" style="display:none">
            <h2 class="score-card-title">Sinu tulemus</h2>
            <div class="score-grid">
                <div class="score-item">
                    <span class="score-label"> Nimi</span>
                    <span id="resultName" class="score-value"></span>
                </div>
                <div class="score-item">
                    <span class="score-label"> Aeg</span>
                    <span id="resultTime" class="score-value"></span>
                </div>
                <div class="score-item">
                    <span class="score-label"> Kiirus (WPM)</span>
                    <span id="resultWPM" class="score-value"></span>
                </div>
                <div class="score-item">
                    <span class="score-label"> Tase</span>
                    <span id="resultLevel" class="score-value"></span>
                </div>
            </div>
            <div class="speed-image-wrap">
                <div id="speedEmoji" class="speed-emoji"></div>
                <p id="speedCaption" class="speed-caption"></p>
            </div>
        </section>

    </main>

    <audio id="sndStart" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="sndType" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="sndEnd" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="sndTop" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1362/1362-preview.mp3" type="audio/mpeg">
    </audio>
    <script>
    (function() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%typer';
        const fontSize = 14;
        let cols, drops, speeds, brightCol;
        //Claude aitas selle osa kirjutamisega
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / fontSize);
            drops = Array(cols).fill(0).map(() => Math.random() * -80);
            speeds = Array(cols).fill(0).map(() => 0.3 + Math.random() * 0.7);
            brightCol = Math.floor(Math.random() * cols);
        }

        init();
        window.addEventListener('resize', init);
       //Mõlemad Claude ja Chatgpt aitasid selle osa kirjutamisega
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < cols; i++) {
                const ch = chars[Math.floor(Math.random() * chars.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;
                // claude aitas selle osa kirjutamisega
                if (i === brightCol) {
                    ctx.fillStyle = '#e8ff47';
                    ctx.shadowColor = '#e8ff47';
                    ctx.shadowBlur = 10;
                } else if (Math.random() > 0.97) {
                    ctx.fillStyle = '#ccffcc';
                    ctx.shadowColor = '#00ff41';
                    ctx.shadowBlur = 4;
                } else {
                    ctx.fillStyle = '#008f2a';
                    ctx.shadowBlur = 0;
                }

                ctx.font = fontSize + 'px "Courier New", monospace';
                ctx.fillText(ch, x, y);
                ctx.shadowBlur = 0;

                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                    if (Math.random() > 0.93) brightCol = i;
                }
                drops[i] += speeds[i];
            }
        }

        setInterval(draw, 40);
    })();
    </script>

</body>
</html>
